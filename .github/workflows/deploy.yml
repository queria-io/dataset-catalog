name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
  repository_dispatch:
    types: [dataset-updated]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # カタログの DuckDB<->SQLite 変換だけで 13 分超かかる (成功時の全体所要は 15 分強)。
    # 肥大カタログの初回 snapshot expire は重いため一時的に 60 分に延長している。
    # auto-expire でカタログが縮小したら 30 分に戻すこと。
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      FDL_S3_ENDPOINT: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
      FDL_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      FDL_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      FDL_S3_BUCKET: ${{ vars.S3_BUCKET }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13

      # fdl (frozen-ducklake) はベータ開発中のため、常に最新版を使用する
      - run: uv lock --upgrade-package frozen-ducklake && uv sync

      - name: Sync catalog
        run: uv run fdl sync default

      - name: Sync catalog to D1
        run: uv run --with cloudflare python scripts/sync_catalog_d1.py

  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy
    # timeout-minutes 超過時の deploy の conclusion は failure ではなく cancelled になる
    if: failure() || needs.deploy.result == 'cancelled'
    steps:
      - name: Notify Discord on failure
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"Deploy Failed\", \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"color\": 15158332, \"fields\": [{\"name\": \"Repository\", \"value\": \"${{ github.repository }}\"}, {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\"}, {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\"}]}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
